<p id="summary">Loading summary...</p>
<script>

async function getSummary(){

let text = localStorage.getItem("newsText");

const response = await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer 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",
"HTTP-Referer":"http://localhost:5500",
"X-Title":"News Summary App"
},
body:JSON.stringify({
model:"meta-llama/llama-3.1-8b-instruct",
messages:[
{role:"system",content:"Write a detailed summary with 120 words."},
{role:"user",content:text}
]
})
});

let data = await response.json();

console.log(data);

document.getElementById("summary").innerText =
data.choices[0].message.content;

}

window.onload = getSummary;

</script>
